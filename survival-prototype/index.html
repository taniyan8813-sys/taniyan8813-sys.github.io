<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AKARI : RESTART Prototype</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="kicker">観測記録：外部セクター</p>
          <h1>AKARI : RESTART</h1>
        </div>
        <div class="run-state" id="runState">ヒカリへ向かう</div>
      </header>

      <section class="play-layout" aria-label="Game">
        <div class="stage-wrap">
          <canvas id="game" width="960" height="600" aria-label="Survival roguelite game canvas"></canvas>
        </div>

        <aside class="panel">
          <div class="stat-grid">
            <div>
              <span>体力</span>
              <strong id="statHp">100</strong>
            </div>
            <div>
              <span>同期LV</span>
              <strong id="statLevel">1</strong>
            </div>
            <div>
              <span>記録時間</span>
              <strong id="statTime">0</strong>
            </div>
            <div>
              <span>信号XP</span>
              <strong id="statXp">0/8</strong>
            </div>
            <div>
              <span>突破数</span>
              <strong id="statKills">0</strong>
            </div>
            <div>
              <span>ノイズ</span>
              <strong id="statThreat">1</strong>
            </div>
            <div>
              <span>到達率</span>
              <strong id="statDistance">0%</strong>
            </div>
          </div>

          <div class="loadout">
            <button id="reset" type="button">リセット</button>
            <button id="pause" type="button">一時停止</button>
          </div>

          <section class="upgrade-panel" id="upgradePanel" hidden>
            <h2>信号成長</h2>
            <div id="upgradeChoices" class="upgrade-choices"></div>
          </section>

          <section class="notes">
            <h2>観測ログ</h2>
            <p id="systemLog">信号追跡を開始。E-01への経路を固定。</p>
          </section>
        </aside>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
